services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wishlist_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/static/uploads
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/wishlist_db"
      DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@postgres:5432/wishlist_db"
      SECRET_KEY: "${SECRET_KEY:-super-secret-key-change-in-production-12345}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_BOT_WEBHOOK_URL: "https://${DOMAIN:-wishlistpizda.duckdns.org}"
      PARSER_INTERVAL_HOURS: "24"
      UPLOAD_DIR: "static/uploads"
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN:-wishlistpizda.duckdns.org}"

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
